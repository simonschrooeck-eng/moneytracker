<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoneyTracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">MoneyTracker</span>
      <button id="logout" class="btn btn-light d-none">Log out</button>
    </div>
  </nav>

  <div class="container py-4" style="max-width: 640px;">

    <!-- Login-Ansicht -->
    <div id="loginView">
      <div class="card mx-auto" style="max-width: 380px;">
        <div class="card-body">
          <div class="mb-3">
            <label for="email" class="form-label">Email address:</label>
            <input type="email" class="form-control" id="email" placeholder="John.Doe@thws.de">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password:</label>
            <input type="password" class="form-control" id="password" placeholder="password">
          </div>
          <div class="text-center">
            <button id="login" class="btn btn-primary">Login</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main-Ansicht (anfangs versteckt) -->
    <div id="mainView" class="d-none">

      <!-- Formular: Eintraege generieren -->
      <div class="card mb-4">
        <div class="card-header">Einträge generieren</div>
        <div class="card-body">
          <div class="mb-3">
            <label for="description" class="form-label">Beschreibung</label>
            <input type="text" class="form-control" id="description" placeholder="Einkaufen">
          </div>
          <div class="mb-3">
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="type" id="income" checked>
              <label class="form-check-label" for="income">Einnahme</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="type" id="expense">
              <label class="form-check-label" for="expense">Ausgabe</label>
            </div>
          </div>
          <div class="mb-3">
            <label for="amount" class="form-label">Betrag in €</label>
            <input type="text" class="form-control" id="amount" placeholder="32.99">
            <div class="form-text">Zahl mit max. 2 Nachkommastellen. Punkt als Trennzeichen.</div>
          </div>
          <div class="mb-3">
            <label for="date" class="form-label">Datum</label>
            <input type="date" class="form-control" id="date">
          </div>
          <button type="button" class="btn btn-primary" id="submit">Absenden</button>
        </div>
      </div>

      <!-- Tabelle: Uebersicht -->
      <div class="card">
        <div class="card-header d-flex justify-content-between">
          <span>Übersicht</span>
          <span>Kontostand: <strong id="balance">0.00 €</strong></span>
        </div>
        <div class="card-body p-0">
          <table class="table mb-0">
            <thead>
              <tr><th>Date</th><th>Title</th><th class="text-end">Betrag</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

    </div>

  </div>

  <script src="js/model.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
